<div class="
min-h-screen
flex
items-center
justify-center
bg-gray-100
p-4
">

  <div class="
  bg-white
  w-full
  max-w-md
  rounded-2xl
  shadow-lg
  p-8
  ">

    <h1 class="
    text-3xl
    font-bold
    text-center
    mb-6
    ">

      Iniciar Sesión

    </h1>

    <div class="mb-4">

      <input
      type="text"
      placeholder="Usuario"
      class="
      w-full
      border
      rounded-lg
      p-3
      " 
      [(ngModel)]="nombre"
      />

    </div>

    <div class="mb-6">

      <input
      type="password"
      placeholder="Contraseña"
      class="
      w-full
      border
      rounded-lg
      p-3
      " 
      [(ngModel)]="password"
      />

    </div>

    <button class="
    w-full
    bg-blue-500
    text-white
    p-3
    rounded-lg
    hover:bg-blue-600
    transition
    "
    (click)="iniciarSesion()"
    >

      Entrar

    </button>

  </div>

</div>

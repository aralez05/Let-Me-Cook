<div class="p-6">

  <h1 class="text-3xl font-bold mb-6">
    Carrito
  </h1>

  <p>Mesa: {{ mesa }}</p>

  <p>Elementos: {{ productos().length }}</p>

  <div *ngFor="let item of productos()">

    <div class="border p-4 mb-2">

      <strong>
        {{ item.nombre }}
      </strong>

      <br>

      Cantidad:
      {{ item.cantidad }}

      <br>

      Subtotal:
      ${{ item.precio * item.cantidad }}
      <button
            (click)="reducir(item)"
            class="
            bg-red-500
            hover:bg-red-600
            text-white
            px-3
            py-1
            rounded
            mt-2
            ">
            -
        </button>
    </div>

  </div>

  <h2>
    Total: ${{ total() }}
  </h2>

</div>
